<!--
  EmailJS Template: NOTIFICATION TO MO
  Template Name: "Lead Notification"
  Subject: {{score}} New Lead: {{client_name}} ({{budget}})
  To email: {{to_email}}
-->
<div style="font-family:sans-serif;max-width:600px;margin:0 auto;background:#fff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;">
  <div style="background:linear-gradient(135deg,#7C3AED,#123ba3);padding:24px 32px;">
    <h1 style="color:#fff;margin:0;font-size:22px;">New Lead {{score}}</h1>
    <p style="color:rgba(255,255,255,0.8);margin:4px 0 0;">via moamjed-af.github.io/moamjed</p>
  </div>
  <div style="padding:32px;">
    <table style="width:100%;border-collapse:collapse;">
      <tr><td style="padding:10px 0;color:#6b7280;font-size:14px;width:40%;">Name</td><td style="padding:10px 0;color:#1e1b4b;font-weight:600;">{{client_name}}</td></tr>
      <tr style="border-top:1px solid #f3f4f6;"><td style="padding:10px 0;color:#6b7280;font-size:14px;">Phone / WhatsApp</td><td style="padding:10px 0;"><a href="{{whatsapp_link}}" style="color:#7C3AED;font-weight:600;">{{client_phone}}</a></td></tr>
      <tr style="border-top:1px solid #f3f4f6;"><td style="padding:10px 0;color:#6b7280;font-size:14px;">Email</td><td style="padding:10px 0;color:#1e1b4b;font-weight:600;">{{client_email}}</td></tr>
      <tr style="border-top:1px solid #f3f4f6;"><td style="padding:10px 0;color:#6b7280;font-size:14px;">Budget</td><td style="padding:10px 0;color:#1e1b4b;font-weight:600;">{{budget}}</td></tr>
      <tr style="border-top:1px solid #f3f4f6;"><td style="padding:10px 0;color:#6b7280;font-size:14px;">Timeline</td><td style="padding:10px 0;color:#1e1b4b;font-weight:600;">{{timeline}}</td></tr>
      <tr style="border-top:1px solid #f3f4f6;"><td style="padding:10px 0;color:#6b7280;font-size:14px;">Score</td><td style="padding:10px 0;font-weight:700;color:#7C3AED;">{{score}}</td></tr>
    </table>
    <div style="margin-top:24px;">
      <a href="{{whatsapp_link}}" style="display:inline-block;background:#25D366;color:#fff;padding:12px 28px;border-radius:8px;text-decoration:none;font-weight:700;font-size:15px;">💬 Reply on WhatsApp Now</a>
    </div>
  </div>
  <div style="padding:16px 32px;background:#f9fafb;border-top:1px solid #e5e7eb;font-size:12px;color:#9ca3af;">Mo Amjed Real Estate · Dubai, UAE · +971 54 424 5800</div>
</div>
