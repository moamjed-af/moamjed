<!--
  EmailJS Template: LEAD NOTIFICATION TO MO
  Template Name: Lead Notification
  Subject: {{score}} — New Enquiry from {{client_name}}
  To email: {{to_email}}
-->
<div style="font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;max-width:600px;margin:0 auto;background:#ffffff;border:1px solid #e2e8f0;border-radius:16px;overflow:hidden;">

  <!-- Header -->
  <div style="background:linear-gradient(135deg,#7C3AED 0%,#123ba3 100%);padding:28px 32px;">
    <p style="color:rgba(255,255,255,0.75);font-size:13px;margin:0 0 6px;letter-spacing:0.5px;text-transform:uppercase;">Mo Amjed Real Estate</p>
    <h1 style="color:#ffffff;margin:0;font-size:22px;font-weight:700;line-height:1.3;">New Client Enquiry</h1>
    <p style="color:rgba(255,255,255,0.8);margin:6px 0 0;font-size:14px;">{{score}}</p>
  </div>

  <!-- Body -->
  <div style="padding:32px;">
    <table style="width:100%;border-collapse:collapse;">
      <tr>
        <td style="padding:10px 0;color:#64748b;font-size:14px;width:42%;border-bottom:1px solid #f1f5f9;">Client Name</td>
        <td style="padding:10px 0;color:#0f172a;font-weight:600;font-size:14px;border-bottom:1px solid #f1f5f9;">{{client_name}}</td>
      </tr>
      <tr>
        <td style="padding:10px 0;color:#64748b;font-size:14px;border-bottom:1px solid #f1f5f9;">Phone / WhatsApp</td>
        <td style="padding:10px 0;border-bottom:1px solid #f1f5f9;">
          <a href="{{whatsapp_link}}" style="color:#7C3AED;font-weight:600;font-size:14px;text-decoration:none;">{{client_phone}}</a>
        </td>
      </tr>
      <tr>
        <td style="padding:10px 0;color:#64748b;font-size:14px;border-bottom:1px solid #f1f5f9;">Email Address</td>
        <td style="padding:10px 0;color:#0f172a;font-weight:600;font-size:14px;border-bottom:1px solid #f1f5f9;">{{client_email}}</td>
      </tr>
      <tr>
        <td style="padding:10px 0;color:#64748b;font-size:14px;border-bottom:1px solid #f1f5f9;">Investment Budget</td>
        <td style="padding:10px 0;color:#0f172a;font-weight:600;font-size:14px;border-bottom:1px solid #f1f5f9;">{{budget}}</td>
      </tr>
      <tr>
        <td style="padding:10px 0;color:#64748b;font-size:14px;">Buying Timeline</td>
        <td style="padding:10px 0;color:#0f172a;font-weight:600;font-size:14px;">{{timeline}}</td>
      </tr>
    </table>

    <div style="margin-top:28px;">
      <a href="{{whatsapp_link}}" style="display:inline-block;background:#25D366;color:#ffffff;padding:14px 32px;border-radius:10px;text-decoration:none;font-weight:700;font-size:15px;">
        Reply on WhatsApp
      </a>
    </div>
  </div>

  <!-- Footer -->
  <div style="padding:16px 32px;background:#f8fafc;border-top:1px solid #e2e8f0;font-size:12px;color:#94a3b8;line-height:1.6;">
    Mo Amjed Real Estate &nbsp;·&nbsp; DIFC, Dubai, UAE &nbsp;·&nbsp; +971 54 424 5800
  </div>
</div>
